name: Nightly Build

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Every night at midnight UTC
  workflow_dispatch:

jobs:
  build-nightly:
    name: Build Debug Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Build Debug Debian Package
        env:
          DEBUG: '1'
        run: |
          chmod +x dist/build-deb.sh
          # Use a nightly version format: version-shortsha-debug
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          VERSION="0.0.0+nightly${DATE}${SHA}"
          
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ./dist/build-deb.sh "$VERSION"

      - name: Upload Debug Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yardctl-debug-deb
          path: dist/*.deb

      - name: Build Debug Binary Only
        env:
          DEBUG: '1'
        run: |
          VERSION="0.0.0+nightly$(date +%Y%m%d)$(git rev-parse --short HEAD)"
          CGO_ENABLED=0 go build \
            -trimpath \
            -gcflags="all=-N -l" \
            -ldflags "-X shipyard/cmd.Version=${VERSION} -X shipyard/cmd.Commit=$(git rev-parse --short HEAD) -X shipyard/cmd.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o yardctl-debug

      - name: Upload Debug Binary
        uses: actions/upload-artifact@v4
        with:
          name: yardctl-debug-binary
          path: yardctl-debug

  build-nightly-arch:
    name: Build Debug Arch Package
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel go git sudo

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Debug Arch Package
        env:
          DEBUG: '1'
        run: |
          # makepkg cannot be run as root
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # Fix Go cache permission issues by setting paths to builder home
          export GOCACHE=/home/builder/.cache/go-build
          export GOPATH=/home/builder/go
          mkdir -p "$GOCACHE" "$GOPATH"
          chown -R builder:builder /home/builder/.cache /home/builder/go
          
          # Use nightly versioning
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          VERSION="0.0.0.nightly.${DATE}.${SHA}"
          
          sed -i "s/pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sudo -u builder -E makepkg -scf --noconfirm

      - name: Upload Debug Arch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yardctl-debug-arch
          path: "*.pkg.tar.zst"

  release-nightly:
    name: Publish Nightly Release
    needs: [build-nightly, build-nightly-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./artifacts

      - name: Create or Update Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build"
          body: |
            This is an automated nightly build of yardctl.
            
            **Warning:** These are debug builds and may be unstable.
            
            Built on: ${{ github.event.repository.updated_at || 'just now' }}
          files: |
            ./artifacts/yardctl-debug
            ./artifacts/*.deb
            ./artifacts/*.pkg.tar.zst
          prerelease: true
          make_latest: false
          # Ensure it overwrites the existing nightly tag
          force_update: true
