name: Build Packages

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build Debian Package
        run: |
          chmod +x dist/build-deb.sh
          # Get version from git tag or default to 0.1.0-dev
          VERSION=$(git describe --tags --always | sed 's/^v//')
          ./dist/build-deb.sh "$VERSION"

      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yardctl-deb
          path: dist/*.deb

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel go git sudo

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Arch Package
        run: |
          # makepkg cannot be run as root
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          # Update version in PKGBUILD to match git tag or current ref
          # Arch pkgver doesn't like dashes, so we replace them with dots
          VERSION=$(git describe --tags --always | sed 's/^v//' | sed 's/-/./g')
          sed -i "s/pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sudo -u builder makepkg -sc --noconfirm

      - name: Upload Arch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yardctl-arch
          path: "*.pkg.tar.zst"

  release:
    name: GitHub Release
    needs: [build-debian, build-arch]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Debian Artifact
        uses: actions/download-artifact@v4
        with:
          name: yardctl-deb
          path: ./dist

      - name: Download Arch Artifact
        uses: actions/download-artifact@v4
        with:
          name: yardctl-arch
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            *.pkg.tar.zst
          generate_release_notes: true
          draft: false
          prerelease: false
